<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>robgreen.io</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: rgb(72, 77, 75);
      font-family: Arial, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.4em;
    }

    .dot {
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: #fff;
      font-size: min(8vw, 14vh);
      animation: pulse 4s ease-in-out infinite;
    }

    h1 {
      font-size: min(8vw, 14vh);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      position: relative;
      cursor: default;
      user-select: none;
    }

    h1::before,
    h1::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      letter-spacing: inherit;
    }

    h1::before {
      color: #a8e6cf;
      animation: glitch1 6s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }

    h1::after {
      color: #ff6b6b;
      animation: glitch2 6s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch1 {
      0%, 89%, 100% { transform: translate(0); opacity: 0; }
      90% { transform: translate(-4px, -1px); opacity: 0.8; }
      92% { transform: translate(4px, 1px); opacity: 0.8; }
      94% { transform: translate(-2px, 0); opacity: 0.8; }
      96% { transform: translate(0); opacity: 0; }
    }

    @keyframes glitch2 {
      0%, 89%, 100% { transform: translate(0); opacity: 0; }
      90% { transform: translate(4px, 1px); opacity: 0.8; }
      92% { transform: translate(-4px, -1px); opacity: 0.8; }
      94% { transform: translate(2px, 0); opacity: 0.8; }
      96% { transform: translate(0); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
    }

    /* Spotlight overlay */
    .spotlight {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle 300px at 50% 50%, transparent 0%, rgba(72,77,75,0.6) 100%);
      transition: background 0.05s;
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
    }

    /* Grain */
    .grain {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      pointer-events: none;
      opacity: 0.08;
      animation: grain 0.5s steps(1) infinite;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }

    @keyframes grain {
      0%  { transform: translate(0, 0); }
      10% { transform: translate(-2%, -3%); }
      20% { transform: translate(3%, 2%); }
      30% { transform: translate(-1%, 4%); }
      40% { transform: translate(4%, -1%); }
      50% { transform: translate(-3%, 3%); }
      60% { transform: translate(2%, -4%); }
      70% { transform: translate(-4%, 1%); }
      80% { transform: translate(1%, -2%); }
      90% { transform: translate(-2%, 4%); }
      100%{ transform: translate(3%, -3%); }
    }

    /* Scramble chars */
    .char { display: inline-block; transition: color 0.1s; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="scanlines"></div>
  <div class="spotlight" id="spotlight"></div>

  <div class="scene">
    <div class="dot" id="dot"></div>
    <h1 id="title" data-text="ROBGREEN.IO"><span id="text-inner"></span></h1>
  </div>

  <script>
    const ORIGINAL = 'ROBGREEN.IO';
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&';
    const inner = document.getElementById('text-inner');
    const h1 = document.getElementById('title');
    const spotlight = document.getElementById('spotlight');

    // Build char spans
    const spans = ORIGINAL.split('').map(c => {
      const s = document.createElement('span');
      s.className = 'char';
      s.textContent = c;
      inner.appendChild(s);
      return s;
    });

    // Scramble effect
    function scramble() {
      let iterations = 0;
      const total = 18;
      const interval = setInterval(() => {
        spans.forEach((s, i) => {
          if (i < iterations / 2) {
            s.textContent = ORIGINAL[i];
            s.style.color = '';
          } else {
            s.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
            s.style.color = `hsl(${Math.random()*360},80%,80%)`;
          }
        });
        iterations++;
        if (iterations > total * 2) {
          clearInterval(interval);
          spans.forEach((s, i) => {
            s.textContent = ORIGINAL[i];
            s.style.color = '';
          });
        }
      }, 40);
    }

    // Run on load, then randomly
    scramble();
    setInterval(scramble, 5000 + Math.random() * 3000);
    setInterval(scramble, 8000 + Math.random() * 5000);

    // Hover scramble
    h1.addEventListener('mouseenter', scramble);

    // Spotlight follow
    document.addEventListener('mousemove', e => {
      spotlight.style.background = `radial-gradient(circle 350px at ${e.clientX}px ${e.clientY}px, transparent 0%, rgba(40,44,42,0.75) 100%)`;
    });

    // Background color slow shift
    let hue = 0;
    function shiftBg() {
      hue += 0.03;
      const l = 28 + Math.sin(hue * 0.5) * 4;
      document.body.style.background = `hsl(${148 + Math.sin(hue)*6}, ${7 + Math.sin(hue*0.7)*2}%, ${l}%)`;
      requestAnimationFrame(shiftBg);
    }
    shiftBg();
  </script>
</body>
</html>
