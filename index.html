<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>robgreen.io</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: rgb(72, 77, 75);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3em;
    }
    .dot {
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: #fff;
      font-size: min(8vw, 14vh);
    }
    h1 {
      font-size: min(8vw, 14vh);
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="dot"></div>
    <h1>robgreen.io</h1>
  </div>
</body>
</html>
